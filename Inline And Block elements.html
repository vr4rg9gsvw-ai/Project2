<!DOCTYPE html>
<html lang="en">
<head>
    <title>Inline and block elements</title>
   <meta charset="UTF-8">
   <link rel="stylesheet" href="Inline And Block elements.css">
</head>
<body>
    <h1 class="h1BlockToInline">Блочный элемент (h1)</h1>
    <div class="BlockToInline">
        <p>Блочный элемент (div,p, img)</p>
    </div>
    <img class="ImageToBlock" src="IMAGES/images.jpg">
    <div class="StylisizedContainer">
        <p class="StylisizedItem">HTML</p>
        <img class="StylisizedItem" src="IMAGES/HTML5_logo_and_wordmark.svg.png">
        <a class="StylisizedItem" href = https://en.wikipedia.org/wiki/HTML>Что такое HTML?</a>
    </div>
</body>
